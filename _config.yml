# Site settings
title: Michael Khanda
description: CTF Writeups & Cybersecurity Research
author: Michael Khanda
email: michaelkhanda006@gmail.com
url: "https://michaelkhanda.github.io"
baseurl: ""

# Social links
github_username: michaelkhanda
linkedin_username: michaelkhanda
medium_username: michaelkhanda

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

header_pages:
  - index.md
  - posts.html
  - about.md
  - categories.html

# Permalink structure
permalink: /:year/:month/:day/:title/

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Collections
collections:
  posts:
    output: true
    permalink: /writeups/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Michael Khanda"
